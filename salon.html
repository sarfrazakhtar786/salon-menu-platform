<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading salon...</title>
  <meta name="description" content="Premium digital salon menu with WhatsApp booking.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --surface: #fcf9f8;
      --surface-soft: #f6f1ee;
      --card: #ffffff;
      --text: #1b1c1c;
      --muted: #675858;
      --line: #eadcda;
      --primary: #845051;
      --primary-soft: #bd8282;
      --gold: #d4af37;
      --charcoal: #2d2d2d;
      --success: #7a9e7e;
      --shadow: 0 24px 60px rgba(132, 80, 81, 0.13);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--surface);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding-bottom: 92px;
    }

    a { color: inherit; text-decoration: none; }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }

    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .loader {
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 700;
    }

    .topbar {
      position: fixed;
      inset: 0 0 auto;
      z-index: 20;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(132, 80, 81, 0.12);
    }

    .nav {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      width: 178px;
      height: 42px;
    }

    .brand img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: left center;
      border-radius: 4px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 600;
    }

    .nav-action {
      min-height: 42px;
      display: inline-grid;
      place-items: center;
      padding: 0 18px;
      border-radius: 9px;
      background: var(--primary);
      color: white;
      font-weight: 800;
    }

    .hero {
      min-height: 620px;
      display: grid;
      align-items: end;
      padding: 110px 0 70px;
      color: white;
      background: linear-gradient(rgba(45, 45, 45, 0.35), rgba(45, 45, 45, 0.72)), var(--charcoal);
      background-position: center;
      background-size: cover;
    }

    .hero-content {
      max-width: 760px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      padding: 8px 12px;
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .gold { color: var(--gold); }

    h1 {
      margin: 0 0 12px;
      font-family: "Playfair Display", serif;
      font-size: clamp(2.6rem, 6vw, 5.4rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .tagline {
      margin: 0 0 26px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.12rem;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 12px;
      padding: 0 22px;
      font-weight: 800;
    }

    .btn.whatsapp { background: var(--success); color: white; }
    .btn.light { background: rgba(255, 255, 255, 0.9); color: var(--charcoal); }
    .btn.primary { background: var(--primary); color: white; }
    .btn.ghost { background: var(--surface-soft); color: var(--primary); }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 44px;
      padding: 72px 0;
      align-items: start;
    }

    .section { margin-bottom: 70px; }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .eyebrow {
      display: block;
      margin-bottom: 8px;
      color: var(--primary-soft);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      line-height: 1.15;
    }

    .tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      padding: 0 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .service-list {
      display: grid;
      gap: 14px;
    }

    .service-card,
    .package-card,
    .review-card,
    .info-card,
    .qr-card {
      border: 1px solid rgba(132, 80, 81, 0.1);
      border-radius: 16px;
      background: white;
      box-shadow: 0 18px 44px rgba(45, 45, 45, 0.05);
    }

    .service-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 20px;
    }

    .service-card h3,
    .package-card h3 {
      margin: 0 0 6px;
      font-family: "Playfair Display", serif;
      font-size: 1.28rem;
      line-height: 1.25;
    }

    .service-card p,
    .package-card p,
    .review-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
    }

    .service-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .price {
      margin-bottom: 10px;
      color: var(--primary);
      font-family: "Playfair Display", serif;
      font-size: 1.45rem;
      font-weight: 700;
      white-space: nowrap;
      text-align: right;
    }

    .add-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      background: var(--surface-soft);
      color: var(--primary);
      font-size: 1.35rem;
      font-weight: 500;
    }

    .add-btn.added {
      background: var(--primary);
      color: white;
    }

    .packages {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .package-card {
      padding: 20px;
    }

    .package-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .package-tag {
      height: fit-content;
      border-radius: 999px;
      background: #fff4cf;
      color: #735c00;
      padding: 6px 10px;
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .package-price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 16px;
    }

    .package-price strong {
      color: var(--primary);
      font-family: "Playfair Display", serif;
      font-size: 1.5rem;
    }

    .package-price s {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      object-fit: cover;
      border-radius: 16px;
      background: var(--surface-soft);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .review-card {
      padding: 20px;
    }

    .stars {
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .author {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
      font-weight: 800;
      font-size: 0.85rem;
    }

    .verified {
      color: var(--success);
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .sidebar {
      position: sticky;
      top: 92px;
      display: grid;
      gap: 18px;
    }

    .info-card {
      padding: 24px;
    }

    .info-card h3,
    .qr-card h3 {
      margin: 0 0 18px;
      font-family: "Playfair Display", serif;
      font-size: 1.45rem;
    }

    .qr-card {
      padding: 22px;
      text-align: center;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(189, 130, 130, 0.18), transparent 44%),
        white;
    }

    .qr-brand {
      color: var(--primary);
      font-family: "Playfair Display", serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .qr-card p {
      margin: 0 auto 16px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .qr-box {
      width: min(220px, 100%);
      margin: 0 auto 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.72);
    }

    .qr-box img {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      border-radius: 10px;
    }

    .qr-url {
      display: block;
      max-width: 100%;
      margin: 0 auto 14px;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.78rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .qr-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .qr-actions .btn {
      width: 100%;
      min-height: 44px;
      padding: 0 14px;
      font-size: 0.88rem;
    }

    .info-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .info-row:last-child { border-bottom: 0; }
    .info-row strong { display: block; margin-bottom: 4px; }
    .info-row span { color: var(--muted); line-height: 1.5; font-size: 0.92rem; }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .tag {
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      padding: 7px 10px;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .booking-card {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      margin-top: 18px;
      font-size: 0.92rem;
    }

    .booking-items {
      display: grid;
      gap: 10px;
      margin: 16px 0;
      text-align: left;
    }

    .booking-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      background: var(--surface-soft);
      color: var(--text);
      font-size: 0.86rem;
    }

    .booking-item button {
      border: 0;
      background: transparent;
      color: var(--primary);
      font-weight: 900;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      margin: 16px 0;
      font-weight: 900;
      color: var(--text);
    }

    .floating-checkout {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 30;
      min-height: 56px;
      border: 0;
      border-radius: 999px;
      background: var(--primary);
      color: white;
      padding: 0 24px;
      box-shadow: var(--shadow);
      font-weight: 900;
    }

    .bottom-nav {
      display: none;
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 28;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      border: 1px solid rgba(132, 80, 81, 0.14);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
      padding: 8px;
      box-shadow: var(--shadow);
    }

    .bottom-nav a {
      min-height: 44px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .bottom-nav a:first-child {
      background: var(--primary);
      color: white;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: end;
      justify-content: center;
      background: rgba(45, 45, 45, 0.42);
      backdrop-filter: blur(12px);
      padding: 20px;
    }

    .modal.open { display: flex; }

    .sheet {
      width: min(620px, 100%);
      max-height: min(92vh, 760px);
      overflow: auto;
      border-radius: 22px;
      background: white;
      padding: 24px;
      box-shadow: 0 34px 90px rgba(45, 45, 45, 0.28);
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .sheet h2 { font-size: 1.8rem; }

    .close-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      background: var(--surface-soft);
      color: var(--primary);
      font-weight: 900;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
    }

    .form-field {
      display: grid;
      gap: 7px;
    }

    .form-field.full { grid-column: 1 / -1; }

    .form-field label {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-field input,
    .form-field textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      padding: 11px 12px;
      color: var(--text);
      outline: 0;
    }

    .form-field textarea {
      min-height: 86px;
      resize: vertical;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(132, 80, 81, 0.12);
    }

    footer {
      padding: 34px 0 110px;
      border-top: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 980px) {
      .main-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .packages, .reviews-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      body { padding-bottom: 86px; }
      .shell { width: min(100% - 32px, 1180px); }
      .brand {
        width: 148px;
        height: 36px;
      }
      .nav-links, .nav-action { display: none; }
      .hero {
        min-height: 580px;
        padding-bottom: 48px;
      }
      .hero-actions .btn { flex: 1 1 100%; }
      .main-grid { padding: 52px 0; }
      .section { margin-bottom: 54px; }
      .section-head {
        align-items: start;
        flex-direction: column;
      }
      .service-card {
        grid-template-columns: 1fr;
      }
      .price { text-align: left; }
      .gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .gallery img {
        width: 100%;
        min-width: 0;
      }
      .floating-checkout { display: none; }
      .bottom-nav { display: grid; }
      .modal { padding: 0; }
      .sheet {
        max-height: 90vh;
        border-radius: 22px 22px 0 0;
      }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"><div class="loader">Loading salon...</div></div>

  <div class="modal" id="booking-modal" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="booking-title">
      <div class="sheet-head">
        <div>
          <span class="eyebrow">Booking Request</span>
          <h2 id="booking-title">Confirm your appointment</h2>
        </div>
        <button class="close-btn" type="button" onclick="closeBooking()">x</button>
      </div>
      <div id="modal-summary"></div>
      <form class="form-grid" id="booking-form">
        <div class="form-field">
          <label for="customer-name">Name</label>
          <input id="customer-name" type="text" placeholder="Your name" required>
        </div>
        <div class="form-field">
          <label for="customer-phone">Phone</label>
          <input id="customer-phone" type="tel" placeholder="03xx-xxxxxxx" required>
        </div>
        <div class="form-field">
          <label for="booking-date">Preferred Date</label>
          <input id="booking-date" type="date">
        </div>
        <div class="form-field">
          <label for="booking-time">Preferred Time</label>
          <input id="booking-time" type="time">
        </div>
        <div class="form-field full">
          <label for="booking-notes">Notes</label>
          <textarea id="booking-notes" placeholder="Any request, event type, or preferred staff"></textarea>
        </div>
        <div class="form-field full">
          <button class="btn primary" type="submit">Send Booking on WhatsApp</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentSalon = null;
    let currentSlug = "";
    let activeCategory = "";
    let cart = [];
    const platformBookingWhatsapp = "923007666376";
    const slugAliases = {
      "rose": "rose-beauty-parlour",
      "rose-beauty-salon": "rose-beauty-parlour",
      "rose-beauty-parlor": "rose-beauty-parlour"
    };

    function getSalonSlug() {
      if (window.location.hash) return window.location.hash.substring(1);
      const params = new URLSearchParams(window.location.search);
      if (params.has("salon")) return params.get("salon");
      const host = window.location.hostname;
      const parts = host.split(".");
      if (!host.includes("vercel.app") && parts.length >= 3 && parts[0] !== "www") return parts[0];
      const match = window.location.pathname.match(/\/salons\/([^\/]+)/);
      return match ? match[1] : null;
    }

    function money(amount) {
      return `Rs. ${Number(amount || 0).toLocaleString()}`;
    }

    function getTotal() {
      return cart.reduce((sum, item) => sum + Number(item.price || 0), 0);
    }

    function escapeAttr(value) {
      return String(value).replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    async function init() {
      currentSlug = slugAliases[getSalonSlug()] || getSalonSlug();
      if (!currentSlug) {
        showError("Salon not found. Please open a valid salon link.");
        return;
      }

      try {
        const response = await fetch("/salons/data.json");
        const salons = await response.json();
        currentSalon = salons[currentSlug];
        if (!currentSalon) {
          showError(`Salon "${currentSlug}" not found.`);
          return;
        }

        activeCategory = "All Services";
        document.documentElement.style.setProperty("--primary", currentSalon.color || "#845051");
        document.title = `${currentSalon.name} - ${currentSalon.city}`;
        render();
      } catch (error) {
        showError("Error loading salon data. Please refresh the page.");
      }
    }

    function showError(message) {
      document.getElementById("app").innerHTML = `<div class="loader">${message}</div>`;
    }

    function render() {
      const salon = currentSalon;
      const categories = ["All Services", ...Object.keys(salon.services || {})];
      const tags = salon.business_tags || [];
      const socials = Object.entries(salon.socials || {}).filter(([, url]) => url);
      const gallery = salon.gallery || [];
      const rating = salon.stats?.rating || "New";

      document.getElementById("app").innerHTML = `
        <header class="topbar">
          <div class="shell nav">
            <a class="brand" href="/"><img src="/assets/images/salonmenu-logo.png" alt="SalonMenu.pk"></a>
            <nav class="nav-links" aria-label="Salon navigation">
              <a href="#services">Services</a>
              <a href="#packages">Packages</a>
              <a href="#gallery">Gallery</a>
              <a href="#reviews">Reviews</a>
            </nav>
            <button class="nav-action" type="button" onclick="openBooking()">Book Now</button>
          </div>
        </header>

        <section class="hero" style="background-image: linear-gradient(rgba(45,45,45,.35), rgba(45,45,45,.72)), url('${salon.hero_image || ""}')">
          <div class="shell hero-content">
            <div class="badge-row">
              <span class="badge">Premium Member</span>
              <span class="badge"><span class="gold">★</span> ${rating}</span>
              <span class="badge">${salon.area}, ${salon.city}</span>
            </div>
            <h1>${salon.name}</h1>
            <p class="tagline">${salon.tagline || "Premium beauty services and appointment booking."}</p>
            <div class="hero-actions">
              <a class="btn whatsapp" href="https://wa.me/${platformBookingWhatsapp}?text=${encodeURIComponent(`Hi! I want to book an appointment at ${salon.name}.`)}" target="_blank" rel="noopener">WhatsApp</a>
              <a class="btn light" href="tel:${salon.phone}">Call Now</a>
              <a class="btn light" href="https://maps.google.com/?q=${encodeURIComponent(salon.address)}" target="_blank" rel="noopener">Directions</a>
              <button class="btn light" type="button" onclick="shareSalon()">Share</button>
            </div>
          </div>
        </section>

        <main class="shell main-grid">
          <div>
            <section class="section" id="services">
              <div class="section-head">
                <div>
                  <span class="eyebrow">Curated Menu</span>
                  <h2>Our services</h2>
                </div>
              </div>
              <div class="tabs">
                ${categories.map(category => `<button class="tab ${category === activeCategory ? "active" : ""}" type="button" onclick="setCategory('${escapeAttr(category)}')">${category}</button>`).join("")}
              </div>
              <div class="service-list" style="margin-top:24px">
                ${renderServices()}
              </div>
            </section>

            ${renderPackages()}

            ${gallery.length ? `
              <section class="section" id="gallery">
                <div class="section-head">
                  <div>
                    <span class="eyebrow">Portfolio</span>
                    <h2>Salon gallery</h2>
                  </div>
                </div>
                <div class="gallery">
                  ${gallery.map((image, index) => `<img src="${image}" alt="${salon.name} gallery image ${index + 1}" loading="lazy">`).join("")}
                </div>
              </section>
            ` : ""}

            <section class="section" id="reviews">
              <div class="section-head">
                <div>
                  <span class="eyebrow">Client Love</span>
                  <h2>Reviews</h2>
                </div>
              </div>
              <div class="reviews-grid">
                ${(salon.reviews || []).map(review => `
                  <article class="review-card">
                    <div class="stars">${"★".repeat(review.stars || 5)}${"☆".repeat(5 - (review.stars || 5))}</div>
                    <p>"${review.text}"</p>
                    <div class="author">
                      <span>${review.author}</span>
                      ${review.verified ? '<span class="verified">Verified</span>' : ""}
                    </div>
                  </article>
                `).join("")}
              </div>
            </section>
          </div>

          <aside class="sidebar">
            <section class="info-card" id="info">
              <h3>Business Information</h3>
              <div class="info-row"><strong>📍</strong><span><strong>Location</strong>${salon.address}</span></div>
              <div class="info-row"><strong>⏱</strong><span><strong>Opening Hours</strong>${salon.timings}<br>Weekly off: ${salon.weekly_off || "Ask salon"}</span></div>
              <div class="info-row"><strong>☎</strong><span><strong>Phone</strong>${salon.phone}</span></div>
              ${socials.length ? `<div class="info-row"><strong>@</strong><span><strong>Social</strong>${socials.map(([name, url]) => `<a href="${url}" target="_blank" rel="noopener">${name}</a>`).join(" · ")}</span></div>` : ""}
              <div class="tag-row">${tags.map(tag => `<span class="tag">${tag}</span>`).join("")}</div>
              <div class="booking-card" id="booking-card">No services selected yet</div>
              <button class="btn primary" style="width:100%; margin-top:14px" type="button" onclick="openBooking()">Book Appointment</button>
            </section>
            <section class="qr-card" id="qr-menu">
              <div class="qr-brand">SalonMenu.pk</div>
              <h3>Scan this menu</h3>
              <p>Customers can scan, view services, and book on WhatsApp.</p>
              <div class="qr-box">
                <img src="${getQrImageUrl()}" alt="QR code for ${salon.name} menu" loading="lazy">
              </div>
              <span class="qr-url">${getSalonPublicUrl()}</span>
              <div class="qr-actions">
                <button class="btn primary" type="button" onclick="downloadQrCard()">Download QR Card</button>
                <button class="btn ghost" type="button" onclick="copySalonLink()">Copy Menu Link</button>
                <button class="btn ghost" type="button" onclick="shareSalonOnWhatsApp()">Share on WhatsApp</button>
              </div>
            </section>
          </aside>
        </main>

        <footer>
          <div class="shell">© 2026 ${salon.name}. Powered by SalonMenu.pk.</div>
        </footer>

        <button class="floating-checkout" type="button" onclick="openBooking()" id="floating-checkout">Book on WhatsApp</button>
        <nav class="bottom-nav" aria-label="Mobile navigation">
          <a href="#services">Services</a>
          <a href="#packages">Offers</a>
          <a href="#gallery">Gallery</a>
          <a href="#info">Info</a>
        </nav>
      `;

      updateBookingUi();
    }

    function renderServices() {
      const services = activeCategory === "All Services"
        ? Object.entries(currentSalon.services || {}).flatMap(([category, items]) => items.map(item => ({ ...item, category })))
        : (currentSalon.services?.[activeCategory] || []).map(item => ({ ...item, category: activeCategory }));
      if (!services.length) return "<div class='booking-card'>No services available in this category.</div>";

      return services.map(service => {
        const id = `service:${service.name}`;
        const added = cart.some(item => item.id === id);
        return `
          <article class="service-card">
            <div>
              <h3>${service.name}</h3>
              <p>${service.desc || "Premium salon service."}</p>
              <div class="service-meta"><span>${service.time || "Ask timing"}</span><span>${service.category}</span></div>
            </div>
            <div>
              <div class="price">${money(service.price)}</div>
              <button class="add-btn ${added ? "added" : ""}" type="button" onclick="toggleItem('${escapeAttr(id)}', '${escapeAttr(service.name)}', ${Number(service.price || 0)})">${added ? "✓" : "+"}</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderPackages() {
      const packages = currentSalon.packages || [];
      if (!packages.length) return "";

      return `
        <section class="section" id="packages">
          <div class="section-head">
            <div>
              <span class="eyebrow">Offers</span>
              <h2>Packages and deals</h2>
            </div>
          </div>
          <div class="packages">
            ${packages.map(item => {
              const id = `package:${item.name}`;
              const added = cart.some(cartItem => cartItem.id === id);
              return `
                <article class="package-card">
                  <div class="package-top">
                    <div>
                      <h3>${item.name}</h3>
                      <p>${(item.includes || []).join(" · ")}</p>
                    </div>
                    <span class="package-tag">${item.tag || "Offer"}</span>
                  </div>
                  <div class="package-price">
                    <strong>${money(item.price)}</strong>
                    ${item.original_price ? `<s>${money(item.original_price)}</s>` : ""}
                  </div>
                  <button class="btn ghost" style="width:100%; margin-top:16px" type="button" onclick="toggleItem('${escapeAttr(id)}', '${escapeAttr(item.name)}', ${Number(item.price || 0)})">${added ? "Remove Package" : "Select Package"}</button>
                </article>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function setCategory(category) {
      activeCategory = category;
      render();
    }

    function getSalonPublicUrl() {
      return `${window.location.origin}/salons/${currentSlug}/`;
    }

    function getQrImageUrl(size = 220) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&margin=12&data=${encodeURIComponent(getSalonPublicUrl())}`;
    }

    function xmlEscape(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function toggleItem(id, name, price) {
      const existing = cart.findIndex(item => item.id === id);
      if (existing >= 0) {
        cart.splice(existing, 1);
      } else {
        cart.push({ id, name, price });
      }
      render();
    }

    function removeItem(id) {
      cart = cart.filter(item => item.id !== id);
      updateBookingUi();
      render();
    }

    function updateBookingUi() {
      const count = cart.length;
      const total = getTotal();
      const summary = count ? `
        <div class="booking-items">
          ${cart.map(item => `
            <div class="booking-item">
              <span>${item.name}</span>
              <strong>${money(item.price)}</strong>
              <button type="button" onclick="removeItem('${escapeAttr(item.id)}')">Remove</button>
            </div>
          `).join("")}
        </div>
        <div class="total-row"><span>Total Estimate</span><span>${money(total)}</span></div>
      ` : "No services selected yet";

      const bookingCard = document.getElementById("booking-card");
      if (bookingCard) bookingCard.innerHTML = summary;

      const floating = document.getElementById("floating-checkout");
      if (floating) floating.textContent = count ? `${count} selected · ${money(total)}` : "Book on WhatsApp";

      const modalSummary = document.getElementById("modal-summary");
      if (modalSummary) modalSummary.innerHTML = summary;
    }

    function openBooking() {
      updateBookingUi();
      document.getElementById("booking-modal").classList.add("open");
      document.getElementById("booking-modal").setAttribute("aria-hidden", "false");
    }

    function closeBooking() {
      document.getElementById("booking-modal").classList.remove("open");
      document.getElementById("booking-modal").setAttribute("aria-hidden", "true");
    }

    function shareSalon() {
      const url = getSalonPublicUrl();
      if (navigator.share) {
        navigator.share({ title: currentSalon.name, text: currentSalon.tagline, url });
      } else {
        navigator.clipboard?.writeText(url);
        alert("Salon link copied.");
      }
    }

    async function copySalonLink() {
      await navigator.clipboard.writeText(getSalonPublicUrl());
      alert("Salon menu link copied.");
    }

    function shareSalonOnWhatsApp() {
      const text = `View ${currentSalon.name} menu and book here: ${getSalonPublicUrl()}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
    }

    function downloadQrCard() {
      const salonUrl = getSalonPublicUrl();
      const qrUrl = getQrImageUrl(620);
      const salonName = xmlEscape(currentSalon.name);
      const area = xmlEscape(`${currentSalon.area}, ${currentSalon.city}`);
      const safeUrl = xmlEscape(salonUrl);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf8"/>
      <stop offset="1" stop-color="#f3e8e6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#845051" flood-opacity="0.20"/>
    </filter>
  </defs>
  <rect width="1080" height="1350" rx="56" fill="url(#bg)"/>
  <rect x="70" y="70" width="940" height="1210" rx="44" fill="#ffffff" filter="url(#shadow)"/>
  <text x="540" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="54" font-weight="700" fill="#845051">SalonMenu.pk</text>
  <text x="540" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#1b1c1c">${salonName}</text>
  <text x="540" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="600" fill="#675858">${area}</text>
  <rect x="230" y="395" width="620" height="620" rx="34" fill="#fffaf8" stroke="#eadbd9" stroke-width="3"/>
  <image href="${xmlEscape(qrUrl)}" x="270" y="435" width="540" height="540"/>
  <text x="540" y="1110" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#845051">Scan to view menu &amp; book on WhatsApp</text>
  <text x="540" y="1172" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#675858">${safeUrl}</text>
  <text x="540" y="1248" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#bd8282">Powered by SalonMenu.pk</text>
</svg>`;
      const blob = new Blob([svg], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${currentSlug}-qr-card.svg`;
      link.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("booking-form").addEventListener("submit", event => {
      event.preventDefault();
      const details = {
        name: document.getElementById("customer-name").value.trim(),
        phone: document.getElementById("customer-phone").value.trim(),
        date: document.getElementById("booking-date").value,
        time: document.getElementById("booking-time").value,
        notes: document.getElementById("booking-notes").value.trim()
      };

      const selected = cart.length ? cart.map(item => `- ${item.name}: ${money(item.price)}`).join("\n") : "- General appointment request";
      const message = [
        `Hi ${currentSalon.name}, I want to book an appointment.`,
        "",
        "Selected:",
        selected,
        `Total Estimate: ${money(getTotal())}`,
        "",
        `Name: ${details.name}`,
        `Phone: ${details.phone}`,
        `Preferred Date: ${details.date || "Flexible"}`,
        `Preferred Time: ${details.time || "Flexible"}`,
        `Notes: ${details.notes || "None"}`
      ].join("\n");

      window.open(`https://wa.me/${platformBookingWhatsapp}?text=${encodeURIComponent(message)}`, "_blank");
    });

    document.getElementById("booking-modal").addEventListener("click", event => {
      if (event.target.id === "booking-modal") closeBooking();
    });

    init();
  </script>
</body>
</html>

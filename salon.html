<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #c8705a;
    --rose-light: #e8a898;
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --cream: #fdf6ee;
    --dark: #1a1208;
    --text: #3d2b1f;
    --muted: #8a6f5e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--cream); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

  /* NAV */
  .nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding:14px 20px;
    display:flex; justify-content:space-between; align-items:center;
    background:rgba(26,18,8,0.88);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .nav-logo { font-family:'Playfair Display',serif; color:white; font-size:1.1rem; }
  .nav-logo span { font-style:italic; }
  .nav-links { display:flex; gap:1.2rem; }
  .nav-links a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.8rem; transition:color 0.2s; }
  .nav-links a:hover { color:var(--rose-light); }

  /* HERO */
  .hero {
    min-height:100vh;
    background:linear-gradient(160deg,#1a1208 0%,#2e1a0e 40%,#3d2218 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:2rem; position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle,rgba(200,112,90,0.15) 0%,transparent 70%);
    top:-100px; right:-100px; animation:pulse 4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.1);opacity:0.7;} }

  .hero-badge {
    background:rgba(201,169,110,0.2); border:1px solid rgba(201,169,110,0.4);
    color:var(--gold-light); padding:6px 18px; border-radius:50px;
    font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:1.5rem;
  }
  .hero h1 { font-family:'Playfair Display',serif; font-size:clamp(2.5rem,8vw,5rem); color:white; line-height:1.1; margin-bottom:0.5rem; }
  .hero h1 span { font-style:italic; }
  .hero-urdu { font-size:1.1rem; color:var(--gold-light); margin-bottom:1rem; }
  .hero-sub { color:rgba(255,255,255,0.55); font-size:0.95rem; margin-bottom:2.5rem; }

  .btn-book {
    background:linear-gradient(135deg,var(--rose),#a85540); color:white;
    padding:14px 36px; border-radius:50px; text-decoration:none;
    font-size:1rem; font-weight:500; display:inline-flex; align-items:center; gap:10px;
    box-shadow:0 8px 30px rgba(200,112,90,0.4); transition:transform 0.2s,box-shadow 0.2s;
    position:relative; z-index:1;
  }
  .btn-book:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(200,112,90,0.5); }

  .hero-stats { display:flex; gap:2.5rem; margin-top:3rem; position:relative; z-index:1; }
  .stat { text-align:center; }
  .stat-num { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--gold-light); font-weight:700; }
  .stat-label { font-size:0.72rem; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:1px; }

  /* SECTIONS */
  section { padding:4rem 1.5rem; }
  .section-label { font-size:0.72rem; letter-spacing:3px; text-transform:uppercase; color:var(--rose); margin-bottom:0.5rem; }
  .section-title { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,5vw,2.8rem); color:var(--dark); line-height:1.2; margin-bottom:0.5rem; }
  .section-title span { color:var(--rose); font-style:italic; }
  .section-sub { color:var(--muted); font-size:0.9rem; margin-bottom:2.5rem; }
  .inner { max-width:480px; margin:0 auto; }

  /* SERVICES */
  .services { background:white; }
  .category-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:2rem; }
  .tab {
    padding:8px 18px; border-radius:50px; border:1.5px solid var(--gold-light);
    background:transparent; color:var(--muted); font-size:0.82rem;
    font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s;
  }
  .tab.active,.tab:hover { background:var(--rose); border-color:var(--rose); color:white; }
  .service-list { display:none; }
  .service-list.active { display:block; }
  .service-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:1rem 0; border-bottom:1px solid var(--gold-light);
    animation:fadeIn 0.4s ease;
  }
  .service-item:last-child { border-bottom:none; }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-10px);} to{opacity:1;transform:translateX(0);} }
  .service-name { font-weight:500; font-size:0.95rem; color:var(--dark); }
  .service-time { font-size:0.75rem; color:var(--muted); margin-top:2px; }
  .service-price { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--rose); font-weight:700; white-space:nowrap; }

  /* REVIEWS */
  .reviews { background:white; }
  .review-card { background:var(--cream); border-radius:16px; padding:1.2rem; margin-bottom:1rem; border-left:3px solid var(--rose); }
  .review-stars { color:var(--gold); font-size:0.85rem; margin-bottom:6px; }
  .review-text { font-size:0.88rem; color:var(--text); line-height:1.6; margin-bottom:8px; }
  .review-author { font-size:0.78rem; color:var(--muted); font-weight:500; }

  /* INFO */
  .info { background:linear-gradient(160deg,#1a1208,#2e1a0e); color:white; }
  .info .section-title { color:white; }
  .info .section-label { color:var(--rose-light); }
  .info-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:1.5rem; }
  .info-card { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:1rem; }
  .info-card-icon { font-size:1.5rem; margin-bottom:6px; }
  .info-card-title { font-size:0.72rem; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .info-card-value { font-size:0.88rem; color:white; line-height:1.5; }
  .map-btn {
    display:flex; align-items:center; gap:10px;
    background:rgba(200,112,90,0.2); border:1px solid rgba(200,112,90,0.4);
    color:var(--rose-light); padding:12px 20px; border-radius:12px;
    text-decoration:none; font-size:0.88rem; font-weight:500;
    width:100%; justify-content:center; transition:background 0.2s;
  }
  .map-btn:hover { background:rgba(200,112,90,0.3); }

  /* WHATSAPP */
  .wa-float {
    position:fixed; bottom:24px; right:20px; z-index:999;
    display:flex; align-items:center; gap:10px;
    background:#25D366; color:white; padding:12px 20px; border-radius:50px;
    text-decoration:none; font-size:0.88rem; font-weight:500;
    box-shadow:0 6px 25px rgba(37,211,102,0.45);
    transition:transform 0.2s,box-shadow 0.2s;
  }
  .wa-float:hover { transform:translateY(-2px) scale(1.03); }

  footer { background:var(--dark); text-align:center; padding:1.5rem; font-size:0.78rem; color:rgba(255,255,255,0.3); }
  footer span { color:var(--rose-light); }

  /* LOADER */
  .loader { display:flex; align-items:center; justify-content:center; min-height:100vh; font-size:1.5rem; color:var(--muted); }
</style>
</head>
<body>

<div id="app"><div class="loader">Loading... ✨</div></div>

<script>
// ─── GET SALON SLUG FROM URL ───────────────────────────────
// URL format: /salons/noor  OR  noor.salonmenu.pk
function getSalonSlug() {
  // 1. Check for URL parameter (e.g. ?salon=noor) - Best for local testing
  const params = new URLSearchParams(window.location.search);
  if (params.has('salon')) return params.get('salon');

  // 2. Check for subdomain (e.g. noor.salonmenu.pk)
  const host = window.location.hostname; 
  const parts = host.split('.');
  // Vercel auto-assigns .vercel.app domains, so we must ignore them for subdomains
  if (!host.includes('vercel.app') && parts.length >= 3 && parts[0] !== 'www') {
    return parts[0]; 
  }

  // 3. Fallback: Path-based (e.g. /salons/noor)
  const path = window.location.pathname;
  const match = path.match(/\/salons\/([^\/]+)/);
  return match ? match[1] : null;
}

// ─── LOAD DATA & RENDER ────────────────────────────────────
async function init() {
  const slug = getSalonSlug();
  if (!slug) { document.getElementById('app').innerHTML = '<div class="loader">❌ Salon not found</div>'; return; }

  try {
    const res = await fetch('/salons/data.json');
    const allSalons = await res.json();
    const salon = allSalons[slug];
    if (!salon) { document.getElementById('app').innerHTML = '<div class="loader">❌ Salon "' + slug + '" not found</div>'; return; }
    render(salon);
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loader">❌ Error loading data</div>';
  }
}

// ─── RENDER HTML ───────────────────────────────────────────
function render(s) {
  // Apply brand color
  document.documentElement.style.setProperty('--rose', s.color || '#c8705a');
  document.title = s.name + ' — ' + s.city;

  // Build service tabs + lists
  const categories = Object.keys(s.services);
  const icons = { Facial:'✨', Hair:'💇', Makeup:'💄', Nails:'💅', Skin:'🌿', Waxing:'🪶' };

  const tabs = categories.map((cat, i) =>
    `<button class="tab ${i===0?'active':''}" onclick="showCat('${cat}',this)">${icons[cat]||'•'} ${cat}</button>`
  ).join('');

  const lists = categories.map((cat, i) => `
    <div class="service-list ${i===0?'active':''}" id="cat-${cat}">
      ${s.services[cat].map(sv => `
        <div class="service-item">
          <div>
            <div class="service-name">${sv.name}</div>
            <div class="service-time">⏱ ${sv.time}</div>
          </div>
          <div class="service-price">Rs. ${sv.price.toLocaleString()}</div>
        </div>
      `).join('')}
    </div>
  `).join('');

  // Build reviews
  const reviews = s.reviews.map(r => `
    <div class="review-card">
      <div class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
      <div class="review-text">${r.text}</div>
      <div class="review-author">— ${r.author}</div>
    </div>
  `).join('');

  // Inject full HTML
  document.getElementById('app').innerHTML = `
    <nav class="nav">
      <div class="nav-logo">${s.name.split(' ')[0]} <span>${s.name.split(' ').slice(1).join(' ')}</span></div>
      <div class="nav-links">
        <a href="#services">Services</a>
        <a href="#reviews">Reviews</a>
        <a href="#info">Contact</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-badge">✦ ${s.city} Premium Salon ✦</div>
      <h1>${s.name.split(' ')[0]} <span>${s.name.split(' ').slice(1).join(' ')}</span></h1>
      <p class="hero-urdu">${s.tagline}</p>
      <p class="hero-sub">${s.area}, ${s.city}</p>
      <a href="https://wa.me/${s.whatsapp}?text=Hi! I want to book an appointment at ${encodeURIComponent(s.name)}" class="btn-book" target="_blank">
        📅 Book Appointment
      </a>
      <div class="hero-stats">
        <div class="stat"><div class="stat-num">${s.stats.clients}</div><div class="stat-label">Happy Clients</div></div>
        <div class="stat"><div class="stat-num">${s.stats.experience}</div><div class="stat-label">Experience</div></div>
        <div class="stat"><div class="stat-num">${s.stats.rating}★</div><div class="stat-label">Rating</div></div>
      </div>
    </section>

    <section class="services" id="services">
      <div class="inner">
        <div class="section-label">✦ Our Services</div>
        <h2 class="section-title">Kya <span>Chahiye</span> Aapko?</h2>
        <p class="section-sub">Tamam services professional artists ke saath</p>
        <div class="category-tabs">${tabs}</div>
        ${lists}
      </div>
    </section>

    <section class="reviews" id="reviews">
      <div class="inner">
        <div class="section-label">✦ Client Love</div>
        <h2 class="section-title">Hamari <span>Clients</span></h2>
        <p class="section-sub">Unke alfaaz</p>
        ${reviews}
      </div>
    </section>

    <section class="info" id="info">
      <div class="inner">
        <div class="section-label">✦ Find Us</div>
        <h2 class="section-title">Hamare <span>Baare Mein</span></h2>
        <p class="section-sub" style="color:rgba(255,255,255,0.4)">Aayein, mulaqat karein</p>
        <div class="info-cards">
          <div class="info-card"><div class="info-card-icon">📍</div><div class="info-card-title">Address</div><div class="info-card-value">${s.address}</div></div>
          <div class="info-card"><div class="info-card-icon">🕐</div><div class="info-card-title">Timings</div><div class="info-card-value">${s.timings}</div></div>
          <div class="info-card"><div class="info-card-icon">📞</div><div class="info-card-title">Phone</div><div class="info-card-value">${s.phone}</div></div>
          <div class="info-card"><div class="info-card-icon">📍</div><div class="info-card-title">City</div><div class="info-card-value">${s.city}</div></div>
        </div>
        <a href="https://maps.google.com/?q=${encodeURIComponent(s.address)}" class="map-btn" target="_blank">🗺️ Google Maps Pe Dekhein</a>
      </div>
    </section>

    <footer>
      <p>© 2025 ${s.name} &nbsp;|&nbsp; Powered by <span>SalonMenu.pk</span></p>
    </footer>

    <a href="https://wa.me/${s.whatsapp}?text=Hi! I want to book an appointment" class="wa-float" target="_blank">
      💬 Book on WhatsApp
    </a>
  `;
}

// ─── TAB SWITCHER ──────────────────────────────────────────
function showCat(cat, btn) {
  document.querySelectorAll('.service-list').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('cat-' + cat).classList.add('active');
  btn.classList.add('active');
}

init();
</script>
</body>
</html>
